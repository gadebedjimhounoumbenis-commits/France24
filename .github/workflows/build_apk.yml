name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Génère android/, ios/, etc. sans écraser pubspec.yaml ni lib/
      - name: Scaffold platform folders
        run: flutter create --project-name news_app --org com.example .

      # Corrige la version de Kotlin (trop ancienne dans le template par défaut)
      - name: Update Kotlin version
        run: |
          sed -i -E 's/(id [\"'"'"']org\.jetbrains\.kotlin\.android[\"'"'"'] version )[\"'"'"'][^\"'"'"']*[\"'"'"']/\1"1.9.24"/' android/settings.gradle
          echo "----- Contenu de settings.gradle après modification -----"
          cat android/settings.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
